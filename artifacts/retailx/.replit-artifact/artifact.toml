kind = "web"
previewPath = "/"
title = "ET RetailX: Chart Pattern Intelligence"
version = "1.0.0"
id = "artifacts/retailx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18412

[services.development]
run = "pnpm --filter @workspace/retailx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/retailx", "run", "build" ]
publicDir = "artifacts/retailx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18412"
BASE_PATH = "/"
